<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:,">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Monitor - IBKR API</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 20px;
        }
        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .status {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }
        .status.connected {
            background: #d4edda;
            color: #155724;
        }
        .status.disconnected {
            background: #f8d7da;
            color: #721c24;
        }
        .status.connecting {
            background: #fff3cd;
            color: #856404;
        }
        button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        .btn-clear {
            background: #6c757d;
            color: white;
        }
        .btn-clear:hover {
            background: #5a6268;
        }
        .btn-pause {
            background: #ffc107;
            color: #212529;
        }
        .btn-pause:hover {
            background: #e0a800;
        }
        .btn-pause.paused {
            background: #28a745;
            color: white;
        }
        .btn-pause.paused:hover {
            background: #218838;
        }
        .message-count {
            color: #666;
            font-size: 14px;
        }
        .messages {
            background: #1e1e1e;
            border-radius: 12px;
            padding: 16px;
            height: calc(100vh - 220px);
            min-height: 400px;
            overflow-y: auto;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 13px;
        }
        .message {
            padding: 4px 0;
            border-bottom: 1px solid #333;
            color: #d4d4d4;
        }
        .message:last-child {
            border-bottom: none;
        }
        .message .timestamp {
            color: #808080;
            margin-right: 10px;
        }
        .message .name {
            color: #569cd6;
            margin-right: 10px;
        }
        .message .value {
            color: #b5cea8;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #007bff;
            text-decoration: none;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <a href="/" class="back-link">&larr; Back to Home</a>
    <h1>WebSocket Monitor</h1>
    <p class="subtitle">Real-time market data feed</p>

    <div class="controls">
        <span id="status" class="status disconnected">Disconnected</span>
        <button id="pauseBtn" class="btn-pause">Pause</button>
        <button id="clearBtn" class="btn-clear">Clear</button>
        <span id="messageCount" class="message-count">0 messages</span>
        <span id="tickerCount" class="message-count">0 tickers</span>
    </div>

    <div id="messages" class="messages"></div>

    <script>
        const MAX_MESSAGES = 500;
        const messagesDiv = document.getElementById('messages');
        const statusSpan = document.getElementById('status');
        const pauseBtn = document.getElementById('pauseBtn');
        const clearBtn = document.getElementById('clearBtn');
        const messageCountSpan = document.getElementById('messageCount');

        const tickerCountSpan = document.getElementById('tickerCount');
        let messageCount = 0;
        let seenTickers = new Set();
        let paused = false;
        let ws = null;

        function setStatus(status) {
            statusSpan.className = 'status ' + status;
            statusSpan.textContent = status.charAt(0).toUpperCase() + status.slice(1);
        }

        function updateMessageCount() {
            messageCountSpan.textContent = messageCount + ' message' + (messageCount !== 1 ? 's' : '');
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp * 1000);
            return date.toLocaleTimeString();
        }

        function addMessage(data) {
            if (paused) return;

            const div = document.createElement('div');
            div.className = 'message';

            div.innerHTML = `
                <span class="timestamp">${formatTime(data.event_time)}</span>
                <span class="name">${data.name}</span>
                <span class="value">${data.value}</span>
            `;

            messagesDiv.insertBefore(div, messagesDiv.firstChild);
            messageCount++;
            seenTickers.add(data.name.split('__')[0]);

            // Cap messages to prevent slowdown
            while (messagesDiv.children.length > MAX_MESSAGES) {
                messagesDiv.removeChild(messagesDiv.lastChild);
            }

            updateMessageCount();
            tickerCountSpan.textContent = seenTickers.size + ' ticker' + (seenTickers.size !== 1 ? 's' : '');
        }

        function connect() {
            if (ws) {
                ws.onclose = null;
                ws.close();
            }

            setStatus('connecting');

            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/`);

            ws.onopen = function() {
                setStatus('connected');
            };

            ws.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    addMessage(data);
                } catch (e) {
                    console.error('Failed to parse message:', e);
                }
            };

            ws.onclose = function() {
                setStatus('disconnected');
                setTimeout(connect, 3000);
            };

            ws.onerror = function(error) {
                console.error('WebSocket error:', error);
            };
        }

        pauseBtn.addEventListener('click', function() {
            paused = !paused;
            if (paused) {
                pauseBtn.textContent = 'Resume';
                pauseBtn.classList.add('paused');
            } else {
                pauseBtn.textContent = 'Pause';
                pauseBtn.classList.remove('paused');
            }
        });

        clearBtn.addEventListener('click', function() {
            messagesDiv.innerHTML = '';
            messageCount = 0;
            seenTickers.clear();
            updateMessageCount();
            tickerCountSpan.textContent = '0 tickers';
        });

        // Start connection
        connect();
    </script>
</body>
</html>
